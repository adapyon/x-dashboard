<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<meta name="referrer" content="no-referrer">
<title>X Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"><\/script>
<style>
  :root {
    --bg:#0d0f14; --bg2:#151820; --bg3:#1c2030;
    --border:#252a3a; --border2:#2e3550;
    --accent:#4f8ef7; --accent2:#7c5af7;
    --text:#e8ecf4; --text2:#8890a8; --text3:#555e7a;
    --like:#f06292; --rt:#4caf88; --header-h:52px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    width:1080px; height:1920px; overflow:hidden;
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    display:flex; flex-direction:column;
  }
  #header {
    height:var(--header-h); background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 20px; gap:16px; flex-shrink:0;
  }
  #header h1 {
    font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:600; letter-spacing:0.08em;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  #updated { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); margin-left:auto; }
  #updated span { color:var(--text2); }
  #refresh-btn {
    background:var(--bg3); border:1px solid var(--border2); color:var(--text2);
    font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; transition:all 0.15s;
  }
  #refresh-btn:hover { background:var(--border2); color:var(--text); }
  #refresh-btn.loading { opacity:0.5; cursor:default; }

  /* 3カラムグリッド */
  #columns {
    flex:1; display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:1px; background:var(--border); overflow:hidden;
    height:calc(1920px - var(--header-h));
  }

  .column {
    background:var(--bg); display:flex; flex-direction:column; overflow:hidden;
    transition:opacity 0.15s;
  }
  /* ドラッグ中スタイル */
  .column.sortable-drag { opacity:0.4; }
  .column.sortable-ghost { opacity:0.6; background:var(--bg3); }

  .col-header {
    height:44px; background:var(--bg2); border-bottom:2px solid var(--border);
    display:flex; align-items:center; padding:0 14px; gap:8px; flex-shrink:0;
    position:relative; cursor:grab; user-select:none;
  }
  .col-header:active { cursor:grabbing; }
  .col-header::after {
    content:''; position:absolute; bottom:-2px; left:0; width:40%; height:2px;
    background:linear-gradient(90deg,var(--accent),transparent);
  }
  /* ドラッグハンドルアイコン */
  .drag-handle {
    color:var(--text3); font-size:12px; flex-shrink:0; opacity:0.6;
    margin-right:2px;
  }
  .col-icon { font-size:13px; }
  .col-title { font-size:13px; font-weight:700; letter-spacing:0.03em; color:var(--text); }
  .col-count {
    margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px;
    color:var(--text3); background:var(--bg3); padding:2px 6px; border-radius:10px;
  }
  .col-body { flex:1; overflow-y:auto; overflow-x:hidden; }
  .col-body::-webkit-scrollbar { width:3px; }
  .col-body::-webkit-scrollbar-track { background:transparent; }
  .col-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }

  .tweet {
    padding:11px 14px; border-bottom:1px solid var(--border);
    cursor:pointer; transition:background 0.1s; animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
  .tweet:hover { background:var(--bg2); }
  .tweet:last-child { border-bottom:none; }
  .tweet-user { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0; background:var(--bg3); }
  .user-info { min-width:0; }
  .display-name { font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .screen-name { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
  .tweet-time { margin-left:auto; font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .tweet-text { font-size:12px; line-height:1.6; color:var(--text); word-break:break-word; margin-bottom:8px; }
  .tweet-text a { color:var(--accent); text-decoration:none; }
  .tweet-media { margin-bottom:8px; }
  .tweet-media img {
    width:100%; max-height:220px; object-fit:cover;
    border-radius:6px; border:1px solid var(--border); display:block;
  }
  .tweet-media.multi { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
  .tweet-media.multi img { max-height:130px; border-radius:4px; }
  .tweet-stats { display:flex; gap:12px; }
  .stat { display:flex; align-items:center; gap:3px; font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
  .stat-like { color:var(--like); }
  .stat-rt { color:var(--rt); }
  .col-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; gap:8px; color:var(--text3); font-size:12px; }
  .col-error { margin:10px; padding:8px 10px; background:rgba(240,98,146,0.08); border:1px solid rgba(240,98,146,0.2); border-radius:6px; font-size:11px; color:var(--like); word-break:break-all; }
  .skeleton { padding:11px 14px; border-bottom:1px solid var(--border); }
  .skel-line { height:9px; background:var(--bg3); border-radius:4px; margin-bottom:5px; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:0.8;} }
</style>
</head>
<body>
<div id="header">
  <h1>X / DASHBOARD</h1>
  <div id="updated">最終更新: <span id="updated-time">--</span></div>
  <button id="refresh-btn" onclick="loadData()">↻ 更新</button>
</div>
<div id="columns"></div>
<script>
const DATA_URL = 'data.json';
const ORDER_KEY = 'xdash_col_order';

function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d)) return s;
  const n = Math.floor((Date.now()-d)/1000);
  return n<60?n+'秒前':n<3600?Math.floor(n/60)+'分前':n<86400?Math.floor(n/3600)+'時間前':Math.floor(n/86400)+'日前';
}
function linkify(t) {
  return t
    .replace(/https?:\/\/[^\s]+/g,u=>'<a href="'+u+'" target="_blank" rel="noopener">'+u+'</a>')
    .replace(/@(\w+)/g,'<span style="color:var(--accent)">@$1</span>')
    .replace(/#(\w+)/g,'<span style="color:var(--accent2)">#$1</span>');
}
function renderMedia(media) {
  if (!media||!media.length) return '';
  const imgs = media
    .filter(u=>u&&u.includes('pbs.twimg.com'))
    .map(u=>'<img src="'+u+'" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display=\'none\'>');
  if (!imgs.length) return '';
  const cls = imgs.length>=2?'tweet-media multi':'tweet-media';
  return '<div class="'+cls+'">'+imgs.join('')+'</div>';
}
function skeleton() {
  return Array.from({length:5}).map(()=>`<div class="skeleton"><div class="skel-line" style="width:55%;margin-bottom:9px"></div><div class="skel-line" style="width:90%"></div><div class="skel-line" style="width:72%"></div><div class="skel-line" style="width:35%;margin-top:9px"></div></div>`).join('');
}
function renderTweet(t) {
  return `<div class="tweet" onclick="window.open('${t.url}','_blank')">
    <div class="tweet-user">
      <img class="avatar" src="${t.user_icon||''}" alt="" referrerpolicy="no-referrer" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 fill=%22%23252a3a%22/></svg>'">
      <div class="user-info"><div class="display-name">${t.user_name||''}</div><div class="screen-name">@${t.user_screen_name||''}</div></div>
      <div class="tweet-time">${timeAgo(t.created_at)}</div>
    </div>
    <div class="tweet-text">${linkify(t.text||'')}</div>
    ${renderMedia(t.media)}
    <div class="tweet-stats">
      <span class="stat stat-like">♥ ${(t.like_count||0).toLocaleString()}</span>
      <span class="stat stat-rt">↺ ${(t.retweet_count||0).toLocaleString()}</span>
      <span class="stat">💬 ${(t.reply_count||0).toLocaleString()}</span>
    </div>
  </div>`;
}
function renderCol(col) {
  const tweets = col.tweets&&col.tweets.length?col.tweets.map(renderTweet).join(''):'<div class="col-empty"><span>📭</span><span>ツイートなし</span></div>';
  const err = col.error?'<div class="col-error">⚠ '+col.error+'</div>':'';
  return `<div class="column" id="col-${col.id}" data-id="${col.id}">
    <div class="col-header">
      <span class="drag-handle">⠿</span>
      <span class="col-icon">${col.icon||'📄'}</span>
      <span class="col-title">${col.label}</span>
      <span class="col-count">${col.tweets?col.tweets.length:0}</span>
    </div>
    <div class="col-body">${err}${tweets}</div>
  </div>`;
}

let sortable = null;

function initSortable() {
  const el = document.getElementById('columns');
  if (sortable) sortable.destroy();
  sortable = Sortable.create(el, {
    animation: 150,
    handle: '.col-header',
    ghostClass: 'sortable-ghost',
    dragClass: 'sortable-drag',
    onEnd: () => {
      // 並び順をlocalStorageに保存
      const order = Array.from(el.children).map(c=>c.dataset.id);
      try { localStorage.setItem(ORDER_KEY, JSON.stringify(order)); } catch(e){}
    }
  });
}

function applyOrder(columns) {
  try {
    const saved = JSON.parse(localStorage.getItem(ORDER_KEY)||'[]');
    if (!saved.length) return columns;
    const map = Object.fromEntries(columns.map(c=>[c.id,c]));
    const ordered = saved.map(id=>map[id]).filter(Boolean);
    // 新しく追加されたカラムは末尾に
    columns.forEach(c=>{ if(!saved.includes(c.id)) ordered.push(c); });
    return ordered;
  } catch(e) { return columns; }
}

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  const el = document.getElementById('columns');
  btn.classList.add('loading'); btn.textContent='読込中…';
  if (!el.children.length) {
    el.innerHTML = Array.from({length:3}).map(()=>`<div class="column"><div class="col-header"><span class="col-title" style="color:var(--text3)">読込中...</span></div><div class="col-body">${skeleton()}</div></div>`).join('');
  }
  try {
    const r = await fetch(DATA_URL+'?t='+Date.now());
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    const ordered = applyOrder(d.columns);
    el.innerHTML = ordered.map(renderCol).join('');
    initSortable();
    const dt = new Date(d.updated_at);
    document.getElementById('updated-time').textContent = dt.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',hour12:false});
  } catch(e) {
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;width:100%;color:var(--text3);font-size:13px;gap:8px;"><span>⚠</span><span>'+e.message+'</span></div>';
  } finally { btn.classList.remove('loading'); btn.textContent='↻ 更新'; }
}

loadData();
setInterval(loadData, 15*60*1000);
</script>
</body>
</html>
