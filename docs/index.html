<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<meta name="referrer" content="no-referrer">
<title>X Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14; --bg2:#151820; --bg3:#1c2030;
    --border:#252a3a; --border2:#2e3550;
    --accent:#4f8ef7; --accent2:#7c5af7;
    --text:#e8ecf4; --text2:#8890a8; --text3:#555e7a;
    --like:#f06292; --rt:#4caf88; --header-h:52px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body {
    width:1080px; height:1920px; overflow:hidden;
    background:var(--bg); color:var(--text);
    font-family:'Noto Sans JP',sans-serif;
    display:flex; flex-direction:column;
  }
  #header {
    height:var(--header-h); background:var(--bg2);
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 20px; gap:16px; flex-shrink:0;
  }
  #header h1 {
    font-family:'JetBrains Mono',monospace; font-size:15px; font-weight:600; letter-spacing:0.08em;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }
  #updated { font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--text3); margin-left:auto; }
  #updated span { color:var(--text2); }
  #refresh-btn {
    background:var(--bg3); border:1px solid var(--border2); color:var(--text2);
    font-size:12px; padding:5px 12px; border-radius:6px; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; transition:all 0.15s;
    display:flex; align-items:center; gap:5px;
  }
  #refresh-btn:hover { background:var(--border2); color:var(--text); }
  #refresh-btn:disabled { opacity:0.5; cursor:default; }
  .refresh-icon { display:inline-block; font-style:normal; line-height:1; }
  @keyframes spin { from{transform:rotate(0deg);} to{transform:rotate(360deg);} }
  #refresh-btn.loading .refresh-icon { animation:spin 0.7s linear infinite; display:inline-block; }
  #columns {
    flex:1; display:grid; grid-template-columns:1fr 1fr 1fr;
    gap:1px; background:var(--border); overflow:hidden;
    height:calc(1920px - var(--header-h));
  }
  .column { background:var(--bg); display:flex; flex-direction:column; overflow:hidden; transition:opacity 0.15s; }
  .column.sortable-drag { opacity:0.4; }
  .column.sortable-ghost { opacity:0.6; background:var(--bg3); }
  .col-header {
    height:44px; background:var(--bg2); border-bottom:2px solid var(--border);
    display:flex; align-items:center; padding:0 10px 0 14px; gap:7px; flex-shrink:0;
    position:relative; cursor:grab; user-select:none;
  }
  .col-header:active { cursor:grabbing; }
  .col-header::after { content:''; position:absolute; bottom:-2px; left:0; width:40%; height:2px; background:linear-gradient(90deg,var(--accent),transparent); }
  .drag-handle { color:var(--text3); font-size:12px; flex-shrink:0; opacity:0.6; margin-right:2px; }
  .col-icon { font-size:13px; }
  .col-title { font-size:13px; font-weight:700; letter-spacing:0.03em; color:var(--text); }
  .col-unread {
    font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:600;
    color:#fff; background:var(--accent); padding:2px 6px; border-radius:9px;
    min-width:20px; text-align:center; line-height:1.4;
    transition:transform 0.15s;
  }
  .col-count { margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--text3); background:var(--bg3); padding:2px 6px; border-radius:10px; }
  .mark-read-btn {
    background:none; border:1px solid transparent; color:var(--text3);
    font-size:10px; padding:3px 7px; border-radius:5px; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif; flex-shrink:0;
    opacity:0; transition:opacity 0.15s, background 0.1s, border-color 0.1s;
    white-space:nowrap;
  }
  .col-header:hover .mark-read-btn { opacity:1; }
  .mark-read-btn:hover { background:var(--bg3); border-color:var(--border2); color:var(--text2); }
  .col-body { flex:1; overflow-y:auto; overflow-x:hidden; }
  .col-body::-webkit-scrollbar { width:5px; }
  .col-body::-webkit-scrollbar-track { background:var(--bg); }
  .col-body::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }
  .col-body::-webkit-scrollbar-thumb:hover { background:var(--text3); }
  .tweet {
    padding:11px 14px 11px 12px; border-bottom:1px solid var(--border);
    border-left:2px solid transparent;
    cursor:pointer; transition:background 0.1s, border-left-color 0.15s;
    animation:fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(4px);} to{opacity:1;transform:translateY(0);} }
  .tweet:not(.read) { border-left-color:var(--accent); }
  .tweet:hover { background:var(--bg2); border-left-color:var(--accent2) !important; }
  .tweet.read { opacity:0.55; filter:grayscale(20%); border-left-color:transparent; }
  .tweet:last-child { border-bottom:none; }
  .tweet-user { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
  .avatar {
    width:32px; height:32px; border-radius:50%; object-fit:cover; flex-shrink:0;
    background:var(--bg3); transition:box-shadow 0.15s;
  }
  .tweet:hover .avatar { box-shadow:0 0 0 2px var(--accent); }
  .user-info { min-width:0; }
  .display-name { font-size:12px; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .screen-name { font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
  .tweet-time { margin-left:auto; font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; flex-shrink:0; }
  .tweet-text { font-size:12px; line-height:1.6; color:var(--text); word-break:break-word; margin-bottom:8px; }
  .tweet-text a { color:var(--accent); text-decoration:none; }
  .tweet-text a:hover { text-decoration:underline; }
  .tweet-media { margin-bottom:8px; }
  .tweet-media img { width:100%; max-height:220px; object-fit:cover; border-radius:6px; border:1px solid var(--border); display:block; }
  .tweet-media.multi { display:grid; grid-template-columns:1fr 1fr; gap:2px; }
  .tweet-media.multi img { max-height:130px; border-radius:4px; }
  .tweet-stats { display:flex; gap:12px; }
  .stat { display:flex; align-items:center; gap:3px; font-size:10px; color:var(--text3); font-family:'JetBrains Mono',monospace; }
  .stat-like { color:var(--like); }
  .stat-rt { color:var(--rt); }
  .col-empty { display:flex; flex-direction:column; align-items:center; justify-content:center; height:200px; gap:8px; color:var(--text3); font-size:12px; }
  .col-error { margin:10px; padding:8px 10px; background:rgba(240,98,146,0.08); border:1px solid rgba(240,98,146,0.2); border-radius:6px; font-size:11px; color:var(--like); word-break:break-all; }
  .skeleton { padding:11px 14px; border-bottom:1px solid var(--border); }
  .skel-line { height:9px; background:var(--bg3); border-radius:4px; margin-bottom:5px; animation:pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:0.4;} 50%{opacity:0.8;} }
</style>
</head>
<body>
<div id="header">
  <h1>X / DASHBOARD</h1>
  <div id="updated">最終更新: <span id="updated-time">--</span></div>
  <button id="refresh-btn" onclick="loadData()"><span class="refresh-icon">&#x21BB;</span> 更新</button>
</div>
<div id="columns"></div>
<script>
const DATA_URL = 'data.json';
const ORDER_KEY = 'xdash_col_order';
const READ_KEY = 'xdash_read';

function getReadSet() {
  try { return new Set(JSON.parse(localStorage.getItem(READ_KEY) || '[]')); } catch(e) { return new Set(); }
}
function markRead(id) {
  const s = getReadSet(); s.add(id);
  const arr = [...s].slice(-1000);
  try { localStorage.setItem(READ_KEY, JSON.stringify(arr)); } catch(e) {}
}

function timeAgo(s) {
  if (!s) return '';
  const d = new Date(s); if (isNaN(d)) return s;
  const n = Math.floor((Date.now()-d)/1000);
  return n<60?n+'\u79d2\u524d':n<3600?Math.floor(n/60)+'\u5206\u524d':n<86400?Math.floor(n/3600)+'\u6642\u9593\u524d':Math.floor(n/86400)+'\u65e5\u524d';
}

function escapeHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function linkify(t) {
  const escaped = escapeHtml(t);
  return escaped
    .replace(/https?:\/\/[^\s&]+/g, function(u) { return '<a href="'+u+'" target="_blank" rel="noopener noreferrer">'+u+'</a>'; })
    .replace(/@(\w+)/g,'<span style="color:var(--accent)">@$1</span>')
    .replace(/#([\w\u3040-\u9fff]+)/g,'<span style="color:var(--accent2)">#$1</span>');
}

function renderMedia(media) {
  if (!media||!media.length) return '';
  var imgs = media.filter(function(u){return u&&u.includes('pbs.twimg.com');}).map(function(u){return '<img src="'+escapeHtml(u)+'" referrerpolicy="no-referrer" loading="lazy" onerror="this.style.display=\'none\'">';});
  if (!imgs.length) return '';
  return '<div class="'+(imgs.length>=2?'tweet-media multi':'tweet-media')+'">'+imgs.join('')+'</div>';
}

function skeleton() {
  return Array.from({length:5}).map(function(){return '<div class="skeleton"><div class="skel-line" style="width:55%;margin-bottom:9px"></div><div class="skel-line" style="width:90%"></div><div class="skel-line" style="width:72%"></div><div class="skel-line" style="width:35%;margin-top:9px"></div></div>';}).join('');
}

function renderTweet(t) {
  var readSet = getReadSet();
  var isRead = readSet.has(t.id);
  var safeUrl = escapeHtml(t.url || '');
  var cls = isRead ? 'tweet read' : 'tweet';
  return '<div class="'+cls+'" data-id="'+escapeHtml(t.id)+'" data-url="'+safeUrl+'" onclick="openTweet(this)">'
    +'<div class="tweet-user">'
    +'<img class="avatar" src="'+escapeHtml(t.user_icon||'')+'" alt="" referrerpolicy="no-referrer" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 fill=%22%23252a3a%22/></svg>\'">'
    +'<div class="user-info"><div class="display-name">'+escapeHtml(t.user_name||'')+'</div><div class="screen-name">@'+escapeHtml(t.user_screen_name||'')+'</div></div>'
    +'<div class="tweet-time">'+timeAgo(t.created_at)+'</div>'
    +'</div>'
    +'<div class="tweet-text">'+linkify(t.text||'')+'</div>'
    +renderMedia(t.media)
    +'<div class="tweet-stats">'
    +'<span class="stat stat-like">&#x2665; '+(t.like_count||0).toLocaleString()+'</span>'
    +'<span class="stat stat-rt">&#x21BA; '+(t.retweet_count||0).toLocaleString()+'</span>'
    +'<span class="stat">&#x1F4AC; '+(t.reply_count||0).toLocaleString()+'</span>'
    +'</div></div>';
}

function openTweet(el) {
  var url = el.dataset.url;
  var id = el.dataset.id;
  if (url) window.open(url, '_blank', 'noopener,noreferrer');
  if (id && !el.classList.contains('read')) {
    markRead(id);
    el.classList.add('read');
    updateUnreadBadge(el.closest('.column'));
  }
}

function updateUnreadBadge(colEl) {
  if (!colEl) return;
  var unreadCount = colEl.querySelectorAll('.tweet:not(.read)').length;
  var badge = colEl.querySelector('.col-unread');
  if (unreadCount > 0) {
    if (!badge) {
      badge = document.createElement('span');
      badge.className = 'col-unread';
      var colCount = colEl.querySelector('.col-count');
      colEl.querySelector('.col-header').insertBefore(badge, colCount);
    }
    badge.textContent = unreadCount;
  } else if (badge) {
    badge.remove();
  }
}

function markAllRead(colId, event) {
  event.stopPropagation();
  var col = document.getElementById('col-'+colId);
  if (!col) return;
  var readSet = getReadSet();
  col.querySelectorAll('.tweet:not(.read)').forEach(function(el) {
    if (el.dataset.id) {
      readSet.add(el.dataset.id);
      el.classList.add('read');
    }
  });
  var arr = [...readSet].slice(-1000);
  try { localStorage.setItem(READ_KEY, JSON.stringify(arr)); } catch(e) {}
  updateUnreadBadge(col);
}

function renderCol(col) {
  var readSet = getReadSet();
  var totalTweets = col.tweets ? col.tweets.length : 0;
  var unreadCount = col.tweets ? col.tweets.filter(function(t){return !readSet.has(t.id);}).length : 0;

  var tweets = totalTweets ? col.tweets.map(renderTweet).join('') : '<div class="col-empty"><span>&#x1F4ED;</span><span>\u30c4\u30a4\u30fc\u30c8\u306a\u3057</span></div>';
  var err = col.error ? '<div class="col-error">&#x26A0; '+escapeHtml(col.error)+'</div>' : '';
  var unreadBadge = unreadCount > 0 ? '<span class="col-unread">'+unreadCount+'</span>' : '';
  var markReadBtn = totalTweets > 0 ? '<button class="mark-read-btn" onclick="markAllRead(\''+escapeHtml(col.id)+'\',event)" title="\u5168\u3066\u65e2\u8aad">&#x2713; \u5168\u65e2\u8aad</button>' : '';

  return '<div class="column" id="col-'+escapeHtml(col.id)+'" data-id="'+escapeHtml(col.id)+'">'
    +'<div class="col-header">'
    +'<span class="drag-handle">&#x2837;</span>'
    +'<span class="col-icon">'+(col.icon||'&#x1F4C4;')+'</span>'
    +'<span class="col-title">'+escapeHtml(col.label)+'</span>'
    +unreadBadge
    +'<span class="col-count">'+totalTweets+'</span>'
    +markReadBtn
    +'</div><div class="col-body">'+err+tweets+'</div></div>';
}

var sortable=null;
function initSortable() {
  var el=document.getElementById('columns');
  if(sortable)sortable.destroy();
  if(typeof Sortable==='undefined')return;
  sortable=Sortable.create(el,{animation:150,handle:'.col-header',filter:'.mark-read-btn',ghostClass:'sortable-ghost',dragClass:'sortable-drag',
    onEnd:function(){
      var order=Array.from(el.children).map(function(c){return c.dataset.id;});
      try{localStorage.setItem(ORDER_KEY,JSON.stringify(order));}catch(e){}
    }
  });
}

function applyOrder(columns) {
  try {
    var saved=JSON.parse(localStorage.getItem(ORDER_KEY)||'[]');
    if(!saved.length)return columns;
    var map=Object.fromEntries(columns.map(function(c){return [c.id,c];}));
    var ordered=saved.map(function(id){return map[id];}).filter(Boolean);
    columns.forEach(function(c){if(!saved.includes(c.id))ordered.push(c);});
    return ordered;
  } catch(e){return columns;}
}

async function loadData() {
  var btn=document.getElementById('refresh-btn');
  var el=document.getElementById('columns');
  btn.classList.add('loading');
  btn.disabled=true;
  if(!el.children.length){
    el.innerHTML=Array.from({length:3}).map(function(){return '<div class="column"><div class="col-header"><span class="col-title" style="color:var(--text3)">\u8aad\u8fbc\u4e2d...</span></div><div class="col-body">'+skeleton()+'</div></div>';}).join('');
  }
  try {
    var r=await fetch(DATA_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    var d=await r.json();
    var ordered=applyOrder(d.columns);
    el.innerHTML=ordered.map(renderCol).join('');
    initSortable();
    var dt=new Date(d.updated_at);
    document.getElementById('updated-time').textContent=dt.toLocaleString('ja-JP',{timeZone:'Asia/Tokyo',hour12:false});
  } catch(e) {
    el.innerHTML='<div style="display:flex;align-items:center;justify-content:center;width:100%;color:var(--text3);font-size:13px;gap:8px;"><span>&#x26A0;</span><span>'+escapeHtml(e.message)+'</span></div>';
  } finally{
    btn.classList.remove('loading');
    btn.disabled=false;
  }
}

var _s=document.createElement('script');
_s.src='https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js';
_s.onload=function(){loadData();};
_s.onerror=function(){loadData();};
document.head.appendChild(_s);
setInterval(loadData,15*60*1000);
</script>
</body>
</html>
