name: Login and Save Cookies

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install twikit (phin fork)
        run: pip install git+https://codeberg.org/phin/twikit.git

      - name: Login and generate cookies
        env:
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: |
          python - <<'EOF'
          import asyncio, os
          from twikit import Client

          async def main():
              client = Client("ja")
              await client.login(
                  auth_info_1="vj_duch",
                  auth_info_2=os.environ["X_EMAIL"],
                  password=os.environ["X_PASSWORD"],
              )
              client.save_cookies("cookies.json")
              print("Login successful!")

          asyncio.run(main())
          EOF

      - name: Commit cookies.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cookies.json
          git commit -m "chore: save login cookies"
          git push
