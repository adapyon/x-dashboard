name: Fetch Tweets

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-twikit-phin

      - name: Install twikit (phin fork)
        run: pip install git+https://codeberg.org/phin/twikit.git

      - name: Fetch tweets
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: python fetch_tweets.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
