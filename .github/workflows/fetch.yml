name: Fetch Tweets

on:
  schedule:
    - cron: "*/15 * * * *"  # Runs every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-twikit-pr419-v1

      - name: Install twikit
        run: pip install git+https://github.com/sakenuGOD/twikit.git@e9b5acf140492fb642b2e5322a9ad55ee10415bc

      - name: Patch twikit compatibility fixes
        run: |
          TWIKIT_DIR=$(python -c 'import twikit, os; print(os.path.dirname(twikit.__file__))')
          echo "Patching in $TWIKIT_DIR"
          for FILE in "$TWIKIT_DIR/user.py" "$TWIKIT_DIR/guest/user.py"; do
            [ -f "$FILE" ] || continue
            sed -i "s/legacy\['withheld_in_countries'\]/legacy.get('withheld_in_countries', [])/g" "$FILE"
            sed -i "s/legacy\['entities'\]\['description'\]\['urls'\]/legacy['entities']['description'].get('urls', [])/g" "$FILE"
            sed -i "s/legacy\['pinned_tweet_ids_str'\]/legacy.get('pinned_tweet_ids_str', [])/g" "$FILE"
            sed -i "s/legacy\['possibly_sensitive'\]/legacy.get('possibly_sensitive', False)/g" "$FILE"
            sed -i "s/legacy\['can_dm'\]/legacy.get('can_dm', False)/g" "$FILE"
            sed -i "s/legacy\['can_media_tag'\]/legacy.get('can_media_tag', False)/g" "$FILE"
            sed -i "s/legacy\['want_retweets'\]/legacy.get('want_retweets', False)/g" "$FILE"
            sed -i "s/legacy\['has_custom_timelines'\]/legacy.get('has_custom_timelines', False)/g" "$FILE"
            sed -i "s/legacy\['fast_followers_count'\]/legacy.get('fast_followers_count', 0)/g" "$FILE"
            sed -i "s/legacy\['is_translator'\]/legacy.get('is_translator', False)/g" "$FILE"
            sed -i "s/legacy\['translator_type'\]/legacy.get('translator_type', 'none')/g" "$FILE"
            echo "Patched $FILE"
          done

      - name: Fetch tweets
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
          X_COOKIES_SET_AT: ${{ vars.X_COOKIES_SET_AT }}
        run: python fetch_tweets.py

      - name: Cleanup sensitive files
        if: always()
        run: rm -f cookies.json

      - name: Commit and push data.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push