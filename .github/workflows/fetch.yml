name: Fetch Tweets

on:
  schedule:
    - cron: "*/15 * * * *"  # Runs every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-twikit-d60-v1

      - name: Install twikit
        run: pip install git+https://github.com/d60/twikit.git

      - name: Patch twikit for withheld_in_countries
        run: |
          TWIKIT_DIR=$(python -c 'import twikit, os; print(os.path.dirname(twikit.__file__))')
          echo "Patching in $TWIKIT_DIR"
          sed -i "s/legacy\['withheld_in_countries'\]/legacy.get('withheld_in_countries', [])/g" "$TWIKIT_DIR/user.py"
          sed -i "s/legacy\['withheld_in_countries'\]/legacy.get('withheld_in_countries', [])/g" "$TWIKIT_DIR/guest/user.py"
          echo "Patched user.py:"
          grep -n withheld_in_countries "$TWIKIT_DIR/user.py" || true
          grep -n withheld_in_countries "$TWIKIT_DIR/guest/user.py" || true

      - name: Fetch tweets
        env:
          X_COOKIES: ${{ secrets.X_COOKIES }}
        run: python fetch_tweets.py

      - name: Cleanup sensitive files
        if: always()
        run: rm -f cookies.json

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
