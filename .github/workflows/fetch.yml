name: Fetch Tweets

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-twikit-2.3.2

      - name: Install dependencies
        run: pip install "twikit==2.3.2"

      - name: Restore cookies cache
        uses: actions/cache@v4
        with:
          path: cookies.json
          key: x-cookies-${{ secrets.X_USERNAME }}

      - name: Fetch tweets
        env:
          X_USERNAME: ${{ secrets.X_USERNAME }}
          X_EMAIL: ${{ secrets.X_EMAIL }}
          X_PASSWORD: ${{ secrets.X_PASSWORD }}
        run: python fetch_tweets.py

      - name: Save cookies cache
        uses: actions/cache/save@v4
        with:
          path: cookies.json
          key: x-cookies-${{ secrets.X_USERNAME }}

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data.json
          git diff --cached --quiet || git commit -m "chore: update tweets $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
